<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>나의 강점 조각</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#3182F6;--blue-light:#EBF3FF;--blue-dark:#1B64DA;
  --bg:#F7F8FA;--white:#FFFFFF;
  --gray-100:#F2F4F6;--gray-200:#E5E8EB;--gray-300:#D1D6DB;
  --gray-400:#AEB5BC;--gray-500:#8B95A1;--gray-600:#6B7684;
  --gray-700:#4E5968;--gray-800:#333D4B;--gray-900:#191F28;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:24px;
  --shadow:0 1px 8px rgba(0,0,0,0.06);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
}
body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--gray-900);min-height:100vh;-webkit-font-smoothing:antialiased}

header{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 20px;position:sticky;top:0;z-index:100}
.hi{max-width:560px;margin:0 auto;height:56px;display:flex;align-items:center}
.logo{font-size:15px;font-weight:700;color:var(--gray-900);display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;background:var(--blue);border-radius:50%;animation:logoPulse 2s ease-in-out infinite}
@keyframes logoPulse{0%,100%{opacity:1}50%{opacity:0.4}}

.main{max-width:560px;margin:0 auto;padding:28px 20px 80px}
.screen{display:none}
.screen.active{display:block}

/* ── 요정 ── */
.fairy-wrap{display:flex;flex-direction:column;align-items:center;padding:32px 0 4px}
.fairy-container{position:relative;width:88px;height:88px;animation:sphereBounce 2.2s ease-in-out infinite}
.sphere{width:88px;height:88px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#7BC8FF 0%,#3182F6 45%,#1040A0 100%);box-shadow:0 14px 36px rgba(49,130,246,0.35),inset 0 -7px 14px rgba(0,0,50,0.2),inset 0 5px 10px rgba(255,255,255,0.5);position:relative;z-index:2}
.sphere::after{content:"";position:absolute;top:10%;left:14%;width:26px;height:15px;background:radial-gradient(ellipse,rgba(255,255,255,0.7) 0%,rgba(255,255,255,0) 100%);border-radius:50%;transform:rotate(-20deg);z-index:4}
@keyframes sphereBounce{0%,100%{transform:translateY(0) scale(1,1)}45%{transform:translateY(-20px) scale(1.04,0.97)}55%{transform:translateY(-22px) scale(1.04,0.97)}80%{transform:translateY(3px) scale(0.97,1.03)}}
.sphere-shadow{width:64px;height:8px;margin:5px auto 0;background:radial-gradient(ellipse,rgba(49,130,246,0.2) 0%,transparent 70%);border-radius:50%;animation:spulse 2.2s ease-in-out infinite}
@keyframes spulse{0%,100%{transform:scaleX(1);opacity:.7}50%{transform:scaleX(0.75);opacity:.3}}
.wing{position:absolute;top:50%;z-index:0;pointer-events:none}
.wing-l{right:58px;transform-origin:right center;animation:wingFlap 1.6s ease-in-out infinite}
.wing-r{left:58px;transform-origin:left center;animation:wingFlap 1.6s ease-in-out infinite 0.08s}
@keyframes wingFlap{0%,100%{transform:translateY(-50%) scaleX(1);opacity:1}50%{transform:translateY(-56%) scaleX(0.58);opacity:0.88}}

/* ── 인사말 ── */
.greeting-wrap{text-align:center;padding:22px 4px 28px}
.greeting-title{font-size:20px;font-weight:800;color:var(--gray-900);line-height:1.5;letter-spacing:-0.4px;margin-bottom:8px}
.greeting-sub{font-size:14px;color:var(--gray-500);font-weight:500;line-height:1.6}

/* ── 조각 섹션 ── */
.section-label{font-size:12px;font-weight:700;color:var(--gray-400);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px}
.piece-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.piece-btn{background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--r-lg);padding:20px 8px 16px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .18s,box-shadow .18s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.piece-btn::after{content:"";position:absolute;inset:0;background:var(--blue-light);opacity:0;transition:opacity .15s}
.piece-btn:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.piece-btn:hover::after{opacity:0.18}
.piece-btn:active{transform:scale(0.97)}
.btn-drop{display:flex;justify-content:center;margin-bottom:10px}
.btn-name{font-size:12px;font-weight:700;color:var(--gray-800);line-height:1.35}
.btn-pct{font-size:11px;color:var(--gray-400);margin-top:3px;font-weight:500}

/* 로딩 / 에러 */
.status-box{grid-column:1/-1;text-align:center;padding:48px 0;color:var(--gray-400)}
.spinner{width:28px;height:28px;border:2.5px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.status-box p{font-size:14px;line-height:1.6}
.retry-btn{margin-top:14px;background:var(--gray-100);border:none;border-radius:50px;padding:8px 18px;font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer}

/* ── 상세 화면 ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;padding:4px 0;font-size:14px;font-weight:600;color:var(--gray-500);cursor:pointer;margin-bottom:28px;transition:color .15s}
.back-btn:hover{color:var(--gray-900)}

.detail-hero{background:var(--white);border-radius:var(--r-xl);padding:36px 24px 28px;box-shadow:var(--shadow);margin-bottom:12px;text-align:center}
.detail-drop-wrap{display:flex;justify-content:center;margin-bottom:6px}
.detail-drop-shadow{width:56px;height:7px;border-radius:50%;margin:0 auto 24px}
.pct-pill{display:inline-flex;align-items:center;gap:4px;background:var(--gray-100);border-radius:50px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:18px}
.pct-pill strong{font-size:19px;font-weight:800;color:var(--gray-900)}
.detail-name{font-size:26px;font-weight:800;color:var(--gray-900);letter-spacing:-0.5px;margin-bottom:10px}
.detail-desc{font-size:15px;color:var(--gray-600);line-height:1.8;max-width:380px;margin:0 auto}

.strength-card{background:var(--white);border-radius:var(--r-xl);padding:22px 20px;box-shadow:var(--shadow);margin-bottom:12px}
.strength-label{font-size:12px;font-weight:700;color:var(--blue);letter-spacing:0.06em;margin-bottom:16px}
.strength-list{display:flex;flex-direction:column;gap:12px}
.strength-item{display:flex;align-items:flex-start;gap:12px}
.s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px}
.s-text{font-size:15px;color:var(--gray-800);font-weight:500;line-height:1.65}

/* ── 물방울 keyframes ── */
@keyframes dropMorphLg{0%,100%{border-radius:62% 38% 68% 32% / 52% 58% 42% 48%}33%{border-radius:50% 50% 36% 64% / 60% 40% 60% 40%}66%{border-radius:38% 62% 58% 42% / 42% 54% 46% 58%}}
@keyframes dropFloatLg{0%,100%{transform:translateY(0) scale(1,1)}50%{transform:translateY(-14px) scale(1.04,0.97)}}
@keyframes dropMorphSm{0%,100%{border-radius:62% 38% 68% 32% / 52% 58% 42% 48%}50%{border-radius:45% 55% 40% 60% / 58% 45% 55% 42%}}
@keyframes dropFloatSm{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── 마법 오버레이 ── */
#magicOverlay{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;pointer-events:none}
#magicOverlay.on{display:flex}
.sp{position:absolute;left:50%;top:45%;border-radius:50%;transition:transform 0.7s cubic-bezier(0.1,0.8,0.2,1),opacity 0.7s ease-out}

/* ── 진입 fade ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.45s ease-out both}
.fu1{animation-delay:0.05s}
.fu2{animation-delay:0.12s}
.fu3{animation-delay:0.19s}

@media(max-width:480px){.main{padding:24px 16px 60px}.piece-grid{grid-template-columns:repeat(2,1fr)}.greeting-title{font-size:18px}}
</style>
</head>

  '도전의 조각':{desc:'낯설고 불편한 상황에서도 새로운 방법을 시도했어요.',strengths:['익숙함을 벗어나 새로움을 추구하는 용기','실패를 두려워하지 않는 도전 정신','창의적인 해결책을 탐색하는 능력']},
  '책임의 조각':{desc:'내 행동이 관계에 미치는 영향을 진지하게 생각했어요.',strengths:['자신의 행동에 책임지는 성숙함','신뢰받는 사람이 되는 일관성','상황을 직시하고 해결하려는 주도성']},
  '노력의 조각':{desc:'지금은 어렵지만 더 나은 방향을 찾아가고 있어요. 그 과정 자체가 이미 대단한 성장이에요.',strengths:['포기하지 않고 계속 시도하는 끈기','자신의 감정을 솔직하게 인식하는 용기','더 나은 방법을 찾으려는 의지']}
};

function getPieceInfo(name) {
  return PIECE_INFO[name] || {
    desc:'이 조각은 갈등 상황에서 네가 보여준 소중한 능력을 담고 있어요.',
    strengths:['자신만의 방식으로 문제를 바라보는 시각','상황에 유연하게 대처하는 능력','관계를 소중히 여기는 마음']
  };
}

function hashStr(s){var h=0;for(var i=0;i<(s||'').length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return h;}
function getPal(name,isWarning){return isWarning?WARN_PAL:PALS[Math.abs(hashStr(name))%PALS.length];}

function dropHtml(name,isWarning,size,anim){
  var p=getPal(name,isWarning);
  var hi='<div style="position:absolute;top:14%;left:20%;width:'+Math.round(size*0.32)+'px;height:'+Math.round(size*0.2)+'px;background:radial-gradient(ellipse,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0) 100%);border-radius:50%;transform:rotate(-15deg)"></div>';
  var an=anim==='lg'?'animation:dropMorphLg 3.5s ease-in-out infinite,dropFloatLg 2.8s ease-in-out infinite;':anim==='sm'?'animation:dropMorphSm 4.2s ease-in-out infinite,dropFloatSm 3.8s ease-in-out infinite;':'';
  return '<div style="position:relative;flex-shrink:0;width:'+size+'px;height:'+size+'px;background:radial-gradient(circle at 35% 28%,'+p.l+' 0%,'+p.m+' 52%,'+p.d+' 100%);border-radius:62% 38% 68% 32% / 52% 58% 42% 48%;box-shadow:0 '+Math.round(size*0.14)+'px '+Math.round(size*0.42)+'px '+p.s+',inset 0 -'+Math.round(size*0.07)+'px '+Math.round(size*0.14)+'px rgba(0,0,20,0.18),inset 0 '+Math.round(size*0.04)+'px '+Math.round(size*0.1)+'px rgba(255,255,255,0.5);'+an+'">'+hi+'</div>';
}

function showMagic(pal,cb){
  var ov=document.getElementById('magicOverlay');
  var ct=document.getElementById('spContainer');
  ct.innerHTML='';
  ov.style.background='rgba(255,255,255,0)';
  ov.classList.add('on');
  var colors=[pal.l,pal.m,'#ffffff',pal.l,pal.d];
  for(var i=0;i<36;i++){
    var angle=(Math.PI*2*i/36)+(Math.random()-0.5)*0.5;
    var dist=80+Math.random()*140;
    var tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist;
    var sz=4+Math.random()*12;
    var el=document.createElement('div');
    el.className='sp';
    el.style.cssText='width:'+sz+'px;height:'+sz+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:'+(Math.random()>0.6?'3px':'50%')+';opacity:1;transform:translate(-50%,-50%) translate(0,0) scale(1);transition-delay:'+(Math.random()*0.1)+'s;';
    ct.appendChild(el);
    (function(e,x,y){
      requestAnimationFrame(function(){requestAnimationFrame(function(){
        e.style.transform='translate(-50%,-50%) translate('+x+'px,'+y+'px) scale(0)';
        e.style.opacity='0';
      });});
    })(el,tx,ty);
  }
  ov.style.transition='background 0.12s';
  ov.style.background='rgba(255,255,255,0.9)';
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    ov.style.background='rgba(255,255,255,0)';
  });});
  setTimeout(function(){ov.classList.remove('on');cb();},720);
}

function switchScreen(from,to){
  document.getElementById(from).classList.remove('active');
  document.getElementById(to).classList.add('active');
}
function goHome(){switchScreen('detailScreen','homeScreen');}

function onPieceClick(name,isWarning,pct){
  var pal=getPal(name,isWarning);
  showMagic(pal,function(){
    renderDetail(name,isWarning,pct);
    switchScreen('homeScreen','detailScreen');
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

function renderDetail(name,isWarning,pct){
  var pal=getPal(name,isWarning);
  var info=getPieceInfo(name);
  document.getElementById('detailDropWrap').innerHTML=dropHtml(name,isWarning,100,'lg');
  document.getElementById('detailDropShadow').style.background='radial-gradient(ellipse,'+pal.s+' 0%,transparent 70%)';
  document.getElementById('pctNum').textContent=pct;
  document.getElementById('detailName').textContent=name;
  document.getElementById('detailDesc').textContent=info.desc;
  document.getElementById('strengthList').innerHTML=info.strengths.map(function(s){
    return '<div class="strength-item"><div class="s-dot" style="background:'+pal.m+'"></div><div class="s-text">'+s+'</div></div>';
  }).join('');
}

function loadPieces(){
  var grid=document.getElementById('pieceGrid');
  db.collection('posts').get()
    .then(function(snapshot){
      var total=snapshot.size;
      var counted={};
      snapshot.forEach(function(doc){
        var d=doc.data();
        // pieceName 또는 다른 필드명 모두 체크
        var n=d.pieceName||d.piece_name||d.name||null;
        if(!n)return;
        if(!counted[n])counted[n]={count:0,isWarning:!!d.isWarning};
        counted[n].count++;
      });
      var items=Object.keys(counted);
      if(!items.length){
        grid.innerHTML='<div class="status-box"><p>아직 조각 데이터가 없어요.<br>먼저 이야기 파일에서 결말을 작성해봐요!</p></div>';
        return;
      }
      // 많이 받은 순 정렬
      items.sort(function(a,b){return counted[b].count-counted[a].count;});
      grid.innerHTML=items.map(function(name){
        var pct=total>0?Math.round(counted[name].count/total*100):0;
        var isWarning=counted[name].isWarning;
        return '<div class="piece-btn" onclick="onPieceClick(''+name.replace(/\/g,'\\').replace(/'/g,'\'')+'',' +isWarning+','+pct+')">'
          +'<div class="btn-drop">'+dropHtml(name,isWarning,42,'sm')+'</div>'
          +'<div class="btn-name">'+name+'</div>'
          +'<div class="btn-pct">'+pct+'%</div>'
          +'</div>';
      }).join('');
    })
    .catch(function(err){
      grid.innerHTML='<div class="status-box"><p>데이터를 불러오지 못했어요.</p><button class="retry-btn" onclick="loadPieces()">다시 시도</button></div>';
      console.error('Firestore 오류:', err);
    });
}

loadPieces();
</script>
</body>
</html>
